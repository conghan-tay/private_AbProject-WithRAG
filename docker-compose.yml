services:
  redis:
    image: redis:7.4-alpine
    restart: always

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/media
      - backend_static:/app/staticfiles
      - backend_data:/app/data
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=insecure-dev-only-key
      - REDIS_URL=redis://redis:6379/0
      - GUNICORN_WORKERS=2
    depends_on:
      - redis
    restart: always

volumes:
  backend_storage:
  backend_static:
  backend_data: 
